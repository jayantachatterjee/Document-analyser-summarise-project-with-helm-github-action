name: CI/CD Pipeline to Local Floci ECR, EKS via ngrok

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1                  
  ECR_REPOSITORY_FRONTEND: ai-frontend
  ECR_REPOSITORY_WORKER: ai-worker
  EKS_CLUSTER_NAME: ai-devops-cluster
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

jobs:
  build-and-deploy:
    name: Build Images & Deploy to Floci EKS
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Clean the ngrok URL (e.g., 'https://xxxx.ngrok-free.dev' -> 'single-rule-stylishly.ngrok-free.dev')
    - name: Extract Clean Floci Host
      id: floci-host
      run: |
        HOST=$(echo "${{ secrets.LOCAL_AWS_ENDPOINT }}" | sed -e 's|^https://||' -e 's|^http://||')
        echo "host=$HOST" >> $GITHUB_OUTPUT

    # Build images locally on the GitHub runner with deterministic Git SHA tags
    - name: Build Frontend API Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend-api
        load: true # Loads image directly into runner's Docker daemon instead of pushing over ngrok
        provenance: false
        tags: |
          ${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
          ${{ env.ECR_REPOSITORY_FRONTEND }}:latest

    - name: Build AI Worker Image
      uses: docker/build-push-action@v5
      with:
        context: ./ai-worker
        load: true
        provenance: false
        tags: |
          ${{ env.ECR_REPOSITORY_WORKER }}:${{ github.sha }}
          ${{ env.ECR_REPOSITORY_WORKER }}:latest

    # Ensure cluster is registered in Floci before attempting kubeconfig extraction
    - name: Ensure Floci EKS Cluster Exists
      run: |
        aws eks describe-cluster \
          --name ${{ env.EKS_CLUSTER_NAME }} \
          --region ${{ env.AWS_REGION }} \
          --endpoint-url ${{ secrets.LOCAL_AWS_ENDPOINT }} || \
        aws eks create-cluster \
          --name ${{ env.EKS_CLUSTER_NAME }} \
          --region ${{ env.AWS_REGION }} \
          --role-arn arn:aws:iam::000000000000:role/dummy-role \
          --resources-vpc-config {} \
          --endpoint-url ${{ secrets.LOCAL_AWS_ENDPOINT }}

    # Point runner's kubeconfig to your local Floci EKS cluster through ngrok
    - name: Update Kubeconfig for Floci EKS
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER_NAME }} \
          --endpoint-url ${{ secrets.LOCAL_AWS_ENDPOINT }}

    # Configure credentials and skip TLS verification for the local ngrok tunnel
    - name: Configure Kubectl Context
      run: |
        kubectl config set-credentials aws --token=dummy-token
        kubectl config set-cluster arn:aws:eks:${{ env.AWS_REGION }}:000000000000:cluster/${{ env.EKS_CLUSTER_NAME }} \
          --insecure-skip-tls-verify=true

    - name: Install Helm
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    # Triggers Helm rollout against your local Floci cluster
    - name: Update Chart Dependencies and Deploy Helm Chart
      run: |
        helm dependency update ./helm/ai-analyzer
        helm upgrade --install ai-analyzer ./helm/ai-analyzer \
          --namespace ai-apps --create-namespace \
          --kube-insecure-skip-tls-verify \
          --set frontend.image.repository=${{ env.ECR_REPOSITORY_FRONTEND }} \
          --set frontend.image.tag=${{ github.sha }} \
          --set worker.image.repository=${{ env.ECR_REPOSITORY_WORKER }} \
          --set worker.image.tag=${{ github.sha }}