name: CI/CD Pipeline to Local Floci EKS via ngrok

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1                  
  ECR_REPOSITORY_FRONTEND: ai-frontend
  ECR_REPOSITORY_WORKER: ai-worker
  EKS_CLUSTER_NAME: ai-devops-cluster
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

jobs:
  build-and-push:
    name: Build, Tag, and Push Images to Floci ECR
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Clean the ngrok URL (e.g., 'https://xxxx.ngrok-free.app' -> 'xxxx.ngrok-free.app')
    - name: Extract Clean Floci Host
      id: floci-host
      run: |
        HOST=$(echo "${{ secrets.LOCAL_AWS_ENDPOINT }}" | sed -e 's|^https://||' -e 's|^http://||')
        echo "host=$HOST" >> $GITHUB_OUTPUT

    # Build and Push Frontend API Image directly via ngrok
    - name: Build and Push Frontend API Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend-api
        push: true
        tags: |
          ${{ steps.floci-host.outputs.host }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
          ${{ steps.floci-host.outputs.host }}/${{ env.ECR_REPOSITORY_FRONTEND }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # Build and Push background Worker Image directly via ngrok
    - name: Build and Push AI Worker Image
      uses: docker/build-push-action@v5
      with:
        context: ./ai-worker
        push: true
        tags: |
          ${{ steps.floci-host.outputs.host }}/${{ env.ECR_REPOSITORY_WORKER }}:${{ github.sha }}
          ${{ steps.floci-host.outputs.host }}/${{ env.ECR_REPOSITORY_WORKER }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-to-eks:
    name: Deploy to Local Floci EKS via Helm
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Extract Clean Floci Host
      id: floci-host
      run: |
        HOST=$(echo "${{ secrets.LOCAL_AWS_ENDPOINT }}" | sed -e 's|^https://||' -e 's|^http://||')
        echo "host=$HOST" >> $GITHUB_OUTPUT

    # Point local kubeconfig to the Floci EKS endpoint
    - name: Update Kubeconfig for Floci EKS
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER_NAME }} \
          --endpoint-url ${{ secrets.LOCAL_AWS_ENDPOINT }}

    - name: Install Helm
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    # Deploys Helm Chart to your local Floci EKS cluster
    - name: Update Chart Dependencies and Deploy Helm Chart
      run: |
        helm dependency update ./helm/ai-analyzer
        helm upgrade --install ai-analyzer ./helm/ai-analyzer \
          --namespace ai-apps --create-namespace \
          --set frontend.image.repository=${{ steps.floci-host.outputs.host }}/${{ env.ECR_REPOSITORY_FRONTEND }} \
          --set frontend.image.tag=${{ github.sha }} \
          --set worker.image.repository=${{ steps.floci-host.outputs.host }}/${{ env.ECR_REPOSITORY_WORKER }} \
          --set worker.image.tag=${{ github.sha }}