name: CI/CD Pipeline to AWS EKS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1                  # Match this to your target AWS region
  ECR_REPOSITORY_FRONTEND: ai-frontend
  ECR_REPOSITORY_WORKER: ai-worker
  EKS_CLUSTER_NAME: ai-devops-cluster

jobs:
  build-and-push:
    name: Build, Tag, and Push Images
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Build and Push Frontend API Image using Git Commit SHA for unique tracking
    # This prevents image collision and ensures deterministic, zero-downtime rollouts
    - name: Build and Push Frontend API Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend-api
        push: true
        tags: |
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # Build and Push background Worker Image using Git Commit SHA
    - name: Build and Push AI Worker Image
      uses: docker/build-push-action@v5
      with:
        context: ./ai-worker
        push: true
        tags: |
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_WORKER }}:${{ github.sha }}
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_WORKER }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-to-eks:
    name: Deploy to Amazon EKS via Helm
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR to grab registry URI
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Update Kubeconfig for EKS
      run: |
        aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        version: 'v3.14.0'

    # Automatically pulls downstream subcharts (Postgres/Redis) and upgrades application resources
    - name: Update Chart Dependencies and Deploy Helm Chart
      run: |
        helm dependency update ./helm/ai-analyzer
        helm upgrade --install ai-analyzer ./helm/ai-analyzer \
          --namespace ai-apps --create-namespace \
          --set frontend.image.repository=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }} \
          --set frontend.image.tag=${{ github.sha }} \
          --set worker.image.repository=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_WORKER }} \
          --set worker.image.tag=${{ github.sha }}