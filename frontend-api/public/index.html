<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Analyzer & Summarizer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 { color: #1e293b; margin-top: 0; }
        p { color: #64748b; }
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            resize: vertical;
            font-size: 15px;
            margin-bottom: 15px;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #1d4ed8; }
        .status-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .pending { background-color: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
        .completed { background-color: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            display: none;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Document Analyzer & Summarizer</h1>
    <p>Submit text below. The API will queue the task via Redis, a background Python worker will process it, and the results will save to PostgreSQL.</p>
    
    <textarea id="documentText" placeholder="Paste your long document content here..."></textarea>
    <button id="submitBtn" onclick="submitJob()">Analyze Document</button>

    <div id="statusBox" class="status-box"></div>
    <div id="resultBox" class="result-box"></div>
</div>

<script>
    let pollInterval;

    async function submitJob() {
        const text = document.getElementById('documentText').value;
        if (!text) return alert('Please enter some text first!');

        document.getElementById('submitBtn').disabled = true;
        const statusBox = document.getElementById('statusBox');
        const resultBox = document.getElementById('resultBox');
        
        statusBox.className = "status-box pending";
        statusBox.style.display = "block";
        statusBox.innerText = "Submitting job to Redis queue...";
        resultBox.style.display = "none";

        try {
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ documentText: text })
            });
            const data = await response.json();
            
            if (data.jobId) {
                statusBox.innerText = `Job #${data.jobId} Queued. Processing via background AI Worker...`;
                // Start polling for results
                pollInterval = setInterval(() => checkStatus(data.jobId), 2000);
            }
        } catch (err) {
            statusBox.className = "status-box";
            statusBox.innerText = "Error submitting job.";
            document.getElementById('submitBtn').disabled = false;
        }
    }

    async function checkStatus(jobId) {
        try {
            const response = await fetch(`/api/result/${jobId}`);
            const data = await response.json();

            if (data.status === 'COMPLETED') {
                clearInterval(pollInterval);
                
                const statusBox = document.getElementById('statusBox');
                statusBox.className = "status-box completed";
                statusBox.innerText = "Success! Background processing complete.";
                
                const resultBox = document.getElementById('resultBox');
                resultBox.style.display = "block";
                resultBox.innerHTML = `<strong>Result:</strong>\n${data.summary}`;
                
                document.getElementById('submitBtn').disabled = false;
            }
        } catch (err) {
            console.error("Polling error:", err);
        }
    }
</script>

</body>
</html>
